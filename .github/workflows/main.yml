name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  schedule:
    - cron: '0 3 * * *'   # Daily at 3 AM UTC

  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  build:
    name: Build Job
    runs-on: ubuntu-latest

    test:
    name: Test Job
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  docker:
    name: Docker Build Job
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t my-app .

  deploy:
    name: Deploy Job
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy application
        run: echo "Deploying application..."
